<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>语音输入同步</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #e0e5ec;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .neu-card {
            background: #e0e5ec;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 8px 8px 16px #b8bec7, -8px -8px 16px #ffffff;
            margin-bottom: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            color: #5a6170;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #5a6170;
        }

        .status-badge.disconnected {
            background: #e0e5ec;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
        }

        .status-badge.connected {
            background: linear-gradient(145deg, #a8e6cf, #88d4ab);
            color: #fff;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .status-badge.connected .status-dot {
            background: #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding: 10px;
            background: #e0e5ec;
            border-radius: 10px;
            box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #ffffff;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #7a8194;
            margin-top: 2px;
        }

        .input-section {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            border: none;
            background: #e0e5ec;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            outline: none;
            box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
            font-family: inherit;
            color: #5a6170;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #a0a7b8;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #7a8194;
            margin-top: 8px;
            font-weight: 500;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .neu-button {
            padding: 12px 8px;
            border: none;
            border-radius: 12px;
            background: #e0e5ec;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
            font-size: 13px;
            font-weight: 600;
            color: #5a6170;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .neu-button:active {
            box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
        }

        .neu-button .icon {
            font-size: 18px;
        }

        .neu-button.primary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 4px 4px 12px rgba(102, 126, 234, 0.4), -4px -4px 12px rgba(255, 255, 255, 0.8);
        }

        .neu-button.primary:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
        }

        .neu-button.danger {
            background: linear-gradient(145deg, #ff6b6b, #ee5a6f);
            color: #fff;
            box-shadow: 4px 4px 12px rgba(255, 107, 107, 0.4), -4px -4px 12px rgba(255, 255, 255, 0.8);
        }

        .neu-button.danger:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e0e5ec;
            padding: 12px 25px;
            border-radius: 25px;
            box-shadow: 4px 4px 12px #b8bec7, -4px -4px 12px #ffffff;
            font-size: 14px;
            font-weight: 600;
            color: #5a6170;
            display: none;
            z-index: 1000;
        }

        .sync-status.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 语音同步</h1>
            <div class="status-badge disconnected" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">未连接</span>
            </div>
        </div>

        <div class="neu-card">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalChars">0</div>
                    <div class="stat-label">总字数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sessionChars">0</div>
                    <div class="stat-label">本次字数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="deleteTime">0s</div>
                    <div class="stat-label">清空时长</div>
                </div>
            </div>
        </div>

        <div class="neu-card">
            <div class="input-section">
                <textarea id="textInput" placeholder="点击此输入框，使用手机语音输入法开始语音输入...

支持：豆包输入法、搜狗、讯飞等"></textarea>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <div class="control-buttons">
                <button class="neu-button danger" onclick="clearAll()">
                    <span class="icon">🗑️</span>
                    <span>清空</span>
                </button>
                <button class="neu-button" onclick="sendEnter()">
                    <span class="icon">↵</span>
                    <span>换行</span>
                </button>
                <button class="neu-button primary" onclick="sendAll()">
                    <span class="icon">📤</span>
                    <span>发送全部</span>
                </button>
                <button class="neu-button" onclick="sendBackspace()">
                    <span class="icon">⌫</span>
                    <span>删除</span>
                </button>
                <button class="neu-button" onclick="sendSpace()">
                    <span class="icon">␣</span>
                    <span>空格</span>
                </button>
                <button class="neu-button" onclick="sendTab()">
                    <span class="icon">⇥</span>
                    <span>Tab</span>
                </button>
            </div>
        </div>
    </div>

    <div class="sync-status" id="syncStatus">✓ 已同步</div>

    <script>
        let ws = null;
        let lastText = '';
        let typingTimeout = null;
        let sessionCharCount = 0; // 本次输入的字数
        const DELETE_SPEED = 0.012; // 每个字符删除需要的秒数（与电脑端一致）

        function connect() {
            const wsUrl = `ws://${window.location.hostname}:8765`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('已连接到服务器');
                updateStatus(true);
            };

            ws.onclose = () => {
                console.log('连接断开，3秒后重连');
                updateStatus(false);
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('连接错误:', error);
                updateStatus(false);
            };
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');

            if (connected) {
                badge.className = 'status-badge connected';
                text.textContent = '已连接';
            } else {
                badge.className = 'status-badge disconnected';
                text.textContent = '未连接';
            }
        }

        function sendData(type, content) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const data = {
                    type: type,
                    content: content,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(data));
                showSyncStatus();
            }
        }

        function showSyncStatus() {
            const status = document.getElementById('syncStatus');
            status.classList.add('show');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                status.classList.remove('show');
            }, 1500);
        }

        function updateStats() {
            const text = document.getElementById('textInput').value;
            const totalChars = text.length;

            document.getElementById('totalChars').textContent = totalChars;
            document.getElementById('sessionChars').textContent = sessionCharCount;

            // 计算清空需要的时长（加20%余量）
            const deleteTime = Math.ceil(totalChars * DELETE_SPEED * 1.2);
            document.getElementById('deleteTime').textContent = deleteTime + 's';
        }

        function sendBackspace() {
            sendData('backspace', '');
        }

        function sendEnter() {
            sendData('enter', '');
            document.getElementById('textInput').value += '\n';
            sessionCharCount += 1;
            updateStats();
        }

        function sendSpace() {
            sendData('text', ' ');
            document.getElementById('textInput').value += ' ';
            sessionCharCount += 1;
            updateStats();
        }

        function sendTab() {
            sendData('tab', '');
            document.getElementById('textInput').value += '    ';
            sessionCharCount += 4;
            updateStats();
        }

        function clearAll() {
            const text = document.getElementById('textInput').value;
            const length = text.length;

            if (length === 0) return;

            // 清空本地输入框
            document.getElementById('textInput').value = '';
            lastText = '';
            sessionCharCount = 0;
            document.getElementById('charCount').textContent = '0 字';

            // 更新统计
            updateStats();

            // 向电脑端发送清空命令，传递字符数量
            sendData('clear', length.toString());

            showSyncStatus();
        }

        function sendAll() {
            const text = document.getElementById('textInput').value;
            if (text) {
                sendData('text', text);
            }
        }

        // 监听输入变化
        document.getElementById('textInput').addEventListener('input', function(e) {
            const text = e.target.value;
            const newContent = text.substring(lastText.length);

            document.getElementById('charCount').textContent = `${text.length} 字`;

            // 只发送新增的内容
            if (newContent) {
                sendData('text', newContent);
                lastText = text;
                sessionCharCount += newContent.length; // 记录本次输入的字数
                updateStats();
            }
        });

        // 页面加载后连接
        window.addEventListener('load', () => {
            connect();
            updateStats();
        });
    </script>
</body>
</html>
