<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#d07f2a">
    <title>语音输入同步</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/voice-sync-icon.svg">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        :root {
            --paper: #e6ebf2;
            --card: rgba(231, 236, 243, 0.98);
            --text: #2b3b4f;
            --muted: #6f7f94;
            --accent: #d07f2a;
            --accent-strong: #b86712;
            --accent-soft: rgba(208, 127, 42, 0.12);
            --green: #278659;
            --green-soft: rgba(39, 134, 89, 0.12);
            --red: #c14e4a;
            --red-soft: rgba(193, 78, 74, 0.12);
            --blue: #325f94;
            --shadow-up: 16px 16px 30px rgba(174, 183, 195, 0.82), -16px -16px 30px rgba(255, 255, 255, 0.96);
            --shadow-down: inset 8px 8px 14px rgba(178, 187, 199, 0.76), inset -8px -8px 14px rgba(255, 255, 255, 0.92);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
            font-family: "Microsoft YaHei UI", "PingFang SC", "Noto Sans SC", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(208, 127, 42, 0.12), transparent 26%),
                radial-gradient(circle at top right, rgba(39, 134, 89, 0.10), transparent 20%),
                linear-gradient(180deg, #edf2f7 0%, #dde4ec 100%);
            user-select: none;
        }

        .container {
            width: min(680px, 100%);
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 18px;
            box-shadow: var(--shadow-up);
            margin-bottom: 16px;
        }

        .header {
            text-align: center;
            padding-top: 8px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 0.01em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            line-height: 1.7;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            border-radius: 999px;
            background: var(--paper);
            color: var(--accent-strong);
            box-shadow: 8px 8px 18px rgba(178, 187, 199, 0.82), -8px -8px 18px rgba(255, 255, 255, 0.96);
            font-size: 14px;
            font-weight: 700;
        }

        .status-badge.connected {
            background: linear-gradient(145deg, #7ed0a6, #4db57c);
            color: #fff;
            box-shadow: 8px 8px 18px rgba(77, 181, 124, 0.34), -8px -8px 18px rgba(255, 255, 255, 0.92);
        }

        .status-badge.error {
            background: linear-gradient(145deg, #e27f79, #c95852);
            color: #fff;
            box-shadow: 8px 8px 18px rgba(201, 88, 82, 0.3), -8px -8px 18px rgba(255, 255, 255, 0.92);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: currentColor;
            opacity: 0.95;
        }

        .guide {
            color: var(--muted);
            line-height: 1.8;
            font-size: 14px;
        }

        .guide strong {
            color: var(--text);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .stat {
            min-width: 0;
            padding: 10px 8px;
            border-radius: 16px;
            background: var(--paper);
            box-shadow: var(--shadow-down);
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 800;
            color: var(--blue);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mode-switch {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .mode-button {
            border: none;
            border-radius: 18px;
            padding: 14px 12px;
            background: var(--paper);
            box-shadow: 8px 8px 16px rgba(178, 187, 199, 0.76), -8px -8px 16px rgba(255, 255, 255, 0.96);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .mode-button.active {
            background: linear-gradient(145deg, #d99347, #c06e18);
            color: #fff;
            box-shadow: 8px 8px 18px rgba(192, 110, 24, 0.34), -8px -8px 18px rgba(255, 255, 255, 0.9);
        }

        .mode-hint {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .input-wrap {
            margin-top: 14px;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            border: none;
            border-radius: 20px;
            padding: 16px;
            resize: vertical;
            outline: none;
            background: var(--paper);
            box-shadow: var(--shadow-down);
            font: inherit;
            font-size: 16px;
            line-height: 1.65;
            color: var(--text);
        }

        textarea::placeholder {
            color: #98a4b6;
        }

        .textarea-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
        }

        .char-count {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
        }

        .sync-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent-strong);
            font-size: 12px;
            font-weight: 700;
        }

        .sync-pill.warn {
            background: var(--red-soft);
            color: var(--red);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 7px;
            margin-top: 12px;
        }

        .action {
            border: none;
            border-radius: 13px;
            padding: 10px 8px;
            background: var(--paper);
            box-shadow: 8px 8px 16px rgba(178, 187, 199, 0.76), -8px -8px 16px rgba(255, 255, 255, 0.96);
            color: var(--text);
            font-size: 12.5px;
            line-height: 1.3;
            font-weight: 700;
            cursor: pointer;
        }

        .action.primary {
            background: linear-gradient(145deg, #d99347, #c06e18);
            color: #fff;
            box-shadow: 8px 8px 18px rgba(192, 110, 24, 0.34), -8px -8px 18px rgba(255, 255, 255, 0.9);
        }

        .action.danger {
            background: linear-gradient(145deg, #df857f, #c55752);
            color: #fff;
            box-shadow: 8px 8px 18px rgba(197, 87, 82, 0.3), -8px -8px 18px rgba(255, 255, 255, 0.92);
        }

        .sync-status {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(22px);
            min-width: min(86vw, 460px);
            max-width: min(90vw, 520px);
            padding: 14px 18px;
            border-radius: 20px;
            background: var(--card);
            box-shadow: var(--shadow-up);
            color: var(--text);
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .sync-status.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .sync-status.pending {
            color: var(--accent-strong);
        }

        .sync-status.success {
            color: var(--green);
        }

        .sync-status.error {
            color: var(--red);
        }

        @media (max-width: 540px) {
            body {
                padding: 12px;
            }

            .card {
                border-radius: 20px;
                padding: 16px;
            }

            textarea {
                min-height: 200px;
            }

            .textarea-meta {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats {
                gap: 6px;
            }

            .stat {
                padding: 9px 6px;
            }

            .stat-label {
                font-size: 10px;
            }

            .stat-value {
                font-size: 13px;
            }

            .actions {
                gap: 6px;
            }

            .action {
                padding: 9px 7px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="card header">
            <h1>语音输入同步</h1>
            <p class="subtitle">手机说话或打字，电脑同步输入。先在电脑上点好目标输入框，再开始操作。</p>
            <div class="status-badge" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">等待连接</span>
            </div>
        </section>

        <section class="card">
            <p class="guide"><strong>第一次用就记住一句话：</strong>这个页面负责把你的输入发到电脑，不会替你决定要输入到哪里。真正要输入的窗口，还是要你先回电脑点一下。</p>
        </section>

        <section class="card">
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">当前模式</div>
                    <div class="stat-value" id="modeValue">实时同步</div>
                </div>
                <div class="stat">
                    <div class="stat-label">电脑输入端</div>
                    <div class="stat-value" id="desktopValue">未就绪</div>
                </div>
                <div class="stat">
                    <div class="stat-label">草稿字数</div>
                    <div class="stat-value" id="draftValue">0</div>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="mode-switch">
                <button class="mode-button active" type="button" id="liveModeButton">实时同步</button>
                <button class="mode-button" type="button" id="manualModeButton">整段同步</button>
            </div>
            <p class="mode-hint" id="modeHint">实时同步适合边说边打字；如果输入法会改写中间文字，切到整段同步更稳。</p>

            <div class="input-wrap">
                <textarea id="textInput" placeholder="在这里说话、输入或粘贴文字。&#10;&#10;实时同步：追加和尾部删除会自动同步。&#10;整段同步：编辑完成后点“整段同步到电脑”。"></textarea>
                <div class="textarea-meta">
                    <div class="char-count" id="charCount">0 字</div>
                    <div class="sync-pill" id="syncPill">电脑内容已跟上</div>
                </div>
            </div>

            <div class="actions">
                <button class="action primary" type="button" id="syncButton">同步到电脑</button>
                <button class="action" type="button" id="clearButton">清空草稿</button>
                <button class="action" type="button" id="newlineButton">插入换行</button>
                <button class="action danger" type="button" id="clearComputerButton">清空电脑输入</button>
            </div>
        </section>
    </div>

    <div class="sync-status" id="syncStatus">准备中</div>

    <script>
        const textInput = document.getElementById("textInput");
        const statusBadge = document.getElementById("statusBadge");
        const statusText = document.getElementById("statusText");
        const desktopValue = document.getElementById("desktopValue");
        const draftValue = document.getElementById("draftValue");
        const charCount = document.getElementById("charCount");
        const modeValue = document.getElementById("modeValue");
        const modeHint = document.getElementById("modeHint");
        const syncPill = document.getElementById("syncPill");
        const syncStatus = document.getElementById("syncStatus");
        const liveModeButton = document.getElementById("liveModeButton");
        const manualModeButton = document.getElementById("manualModeButton");
        const syncButton = document.getElementById("syncButton");
        const clearButton = document.getElementById("clearButton");
        const newlineButton = document.getElementById("newlineButton");
        const clearComputerButton = document.getElementById("clearComputerButton");

        const urlParams = new URLSearchParams(window.location.search);
        let sessionToken = urlParams.get("token") || "";
        const runtimeConfig = { wsPort: 8765, sessionToken: "", directUrl: "", directIpUrl: "", publicHttpUrl: "", publicWsUrl: "" };

        let ws = null;
        let desktopReady = false;
        let composing = false;
        let syncMode = "live";
        let messageCounter = 0;
        let lastAppliedText = "";
        let pendingManualSyncId = "";
        let statusTimer = null;
        let bridgePollTimer = null;
        let bridgeReconnectTimer = null;
        let bridgeEventCursor = 0;
        let bridgeSendChain = Promise.resolve();

        function nextMessageId() {
            messageCounter += 1;
            return `m-${Date.now()}-${messageCounter}`;
        }

        function showSyncStatus(message, tone = "pending", duration = 1800) {
            syncStatus.textContent = message;
            syncStatus.className = `sync-status show ${tone}`;
            window.clearTimeout(statusTimer);
            statusTimer = window.setTimeout(() => {
                syncStatus.classList.remove("show");
            }, duration);
        }

        function updateConnectionBadge(state) {
            statusBadge.className = "status-badge";

            if (state === "connected") {
                statusBadge.classList.add("connected");
                statusText.textContent = "已连接";
                return;
            }

            if (state === "error") {
                statusBadge.classList.add("error");
                statusText.textContent = "链接无效";
                return;
            }

            statusText.textContent = "等待连接";
        }

        function setSyncPill(message, tone = "normal") {
            syncPill.textContent = message;
            syncPill.className = "sync-pill";
            if (tone === "warn") {
                syncPill.classList.add("warn");
            }
        }

        function updateStats() {
            const text = textInput.value;
            draftValue.textContent = String(text.length);
            charCount.textContent = `${text.length} 字`;
        }

        function updateDesktopState() {
            desktopValue.textContent = desktopReady ? "已就绪" : "未就绪";
        }

        function updateModeUi() {
            const liveActive = syncMode === "live";
            liveModeButton.classList.toggle("active", liveActive);
            manualModeButton.classList.toggle("active", !liveActive);
            modeValue.textContent = liveActive ? "实时同步" : "整段同步";
            modeHint.textContent = liveActive
                ? "实时同步适合边说边打字；如果输入法会改写中间文字，切到整段同步更稳。"
                : "整段同步不会在你编辑时自动发出去。编辑完成后，点一次“整段同步到电脑”即可。";
            clearButton.textContent = liveActive ? "清空本地草稿" : "清空草稿";
        }

        function markDesynced(message = "检测到复杂改写，建议整段同步") {
            setSyncPill(message, "warn");
        }

        function markPending(message = "已发送，等待电脑确认") {
            setSyncPill(message);
        }

        function markSynced() {
            setSyncPill("电脑内容已跟上");
        }

        function setMode(mode, showHint = true) {
            syncMode = mode;
            updateModeUi();
            if (mode === "live" && textInput.value !== lastAppliedText) {
                markDesynced("当前草稿和电脑内容可能不同，建议先整段同步");
            }
            if (showHint) {
                showSyncStatus(
                    mode === "live" ? "已切到实时同步。" : "已切到整段同步，更适合改写后的文本。",
                    "pending"
                );
            }
        }

        async function loadRuntimeConfig() {
            try {
                const response = await fetch(`/runtime-config.json?ts=${Date.now()}`, { cache: "no-store" });
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                if (typeof data.wsPort === "number" && data.wsPort > 0) {
                    runtimeConfig.wsPort = data.wsPort;
                }
                if (typeof data.sessionToken === "string" && data.sessionToken.trim()) {
                    runtimeConfig.sessionToken = data.sessionToken.trim();
                    sessionToken = runtimeConfig.sessionToken;
                }
                if (typeof data.directUrl === "string" && data.directUrl.trim()) {
                    runtimeConfig.directUrl = data.directUrl.trim();
                }
                if (typeof data.directIpUrl === "string" && data.directIpUrl.trim()) {
                    runtimeConfig.directIpUrl = data.directIpUrl.trim();
                }
                if (typeof data.publicHttpUrl === "string" && data.publicHttpUrl.trim()) {
                    runtimeConfig.publicHttpUrl = data.publicHttpUrl.trim();
                }
                if (typeof data.publicWsUrl === "string" && data.publicWsUrl.trim()) {
                    runtimeConfig.publicWsUrl = data.publicWsUrl.trim();
                }
            } catch (error) {
                console.warn("读取运行配置失败，使用默认端口。", error);
            }
        }

        function resolveWsUrl() {
            const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
            const currentHost = window.location.hostname;
            if (shouldUseHttpBridge()) {
                const currentPort = window.location.port ? `:${window.location.port}` : "";
                return `${wsProtocol}://${currentHost}${currentPort}/ws`;
            }

            if (runtimeConfig.publicWsUrl) {
                return runtimeConfig.publicWsUrl;
            }

            return `${wsProtocol}://${currentHost}:${runtimeConfig.wsPort || 8765}`;
        }

        function analyzeTailChange(previousText, currentText) {
            if (previousText === currentText) {
                return { type: "noop" };
            }

            if (currentText.startsWith(previousText)) {
                return {
                    type: "append",
                    text: currentText.slice(previousText.length)
                };
            }

            if (previousText.startsWith(currentText)) {
                return {
                    type: "delete",
                    count: previousText.length - currentText.length
                };
            }

            return { type: "complex" };
        }

        function sendPayload(type, content, options = {}) {
            if (!sessionToken) {
                updateConnectionBadge("waiting");
                showSyncStatus("这个手机地址已经失效，请重新扫码。", "error", 2200);
                return "";
            }

            if (!shouldUseHttpBridge() && (!ws || ws.readyState !== WebSocket.OPEN)) {
                showSyncStatus("手机和电脑还没连好，请稍候。", "error", 2000);
                return "";
            }

            const messageId = nextMessageId();
            const payload = {
                type,
                content,
                timestamp: Date.now(),
                messageId
            };


            if (Object.prototype.hasOwnProperty.call(options, "optimisticText")) {
                lastAppliedText = options.optimisticText;
            }

            if (options.manualSync) {
                pendingManualSyncId = messageId;
            }
            if (shouldUseHttpBridge()) {
                bridgeSendChain = bridgeSendChain
                    .catch(() => {})
                    .then(() => bridgePost("/api/send", { token: sessionToken, ...payload }))
                    .catch(() => {
                        updateConnectionBadge("waiting");
                        showSyncStatus("手机和电脑还没连好，请稍候。", "error", 2000);
                    });
            } else {
                ws.send(JSON.stringify(payload));
            }

            showSyncStatus("已发送，等待电脑输入...", "pending");
            return messageId;
        }

        function handleAck(data) {
            if (data.ok) {
                if (data.messageId && data.messageId === pendingManualSyncId) {
                    pendingManualSyncId = "";
                    lastAppliedText = textInput.value;
                }
                markSynced();
                showSyncStatus(data.detail || "已输入到电脑。", "success");
                return;
            }

            if (data.reason === "permission_denied") {
                markDesynced("电脑权限不足，请回电脑管理员启动");
                showSyncStatus("电脑输入权限不足，请回电脑端改用管理员启动。", "error", 2600);
                return;
            }

            markDesynced("电脑内容可能没跟上，建议整段同步");
            showSyncStatus(data.detail || "电脑输入失败，请回电脑端重试。", "error", 2600);
        }

        function updatePresence(connected) {
            desktopReady = !!connected.desktop;
            updateDesktopState();
            updateConnectionBadge(connected.mobile ? "connected" : "waiting");
        }

        function shouldUseHttpBridge() {
            try {
                if (runtimeConfig.publicHttpUrl) {
                    return new URL(runtimeConfig.publicHttpUrl).hostname === window.location.hostname;
                }
            } catch (error) {
            }
            return window.location.protocol === "https:";
        }

        async function bridgePost(path, payload) {
            const response = await fetch(path, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
                cache: "no-store"
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return response.json();
        }

        function handleAuthState(auth) {
            if (!auth) {
                return;
            }
            if (auth.ok) {
                updateConnectionBadge("connected");
                return;
            }
            if (auth.reason) {
                updateConnectionBadge("waiting");
                loadRuntimeConfig();
                showSyncStatus("这个手机地址已经失效，请重新扫码。", "error", 2400);
            }
        }

        function applyBridgeEnvelope(envelope) {
            if (!envelope || typeof envelope !== "object") {
                return;
            }

            if (typeof envelope.lastEventId === "number") {
                bridgeEventCursor = Math.max(bridgeEventCursor, envelope.lastEventId);
            }

            handleAuthState(envelope.auth);

            if (envelope.connected) {
                updatePresence(envelope.connected);
            }

            if (!Array.isArray(envelope.events)) {
                return;
            }

            for (const event of envelope.events) {
                if (typeof event.id === "number") {
                    bridgeEventCursor = Math.max(bridgeEventCursor, event.id);
                }

                if (event.type === "auth") {
                    handleAuthState(event);
                    continue;
                }

                if (event.type === "presence") {
                    updatePresence(event.connected || {});
                    continue;
                }

                if (event.type === "ack") {
                    handleAck(event);
                }
            }
        }

        async function pollBridgeEvents() {
            const response = await fetch(`/api/events?token=${encodeURIComponent(sessionToken)}&since=${bridgeEventCursor}&ts=${Date.now()}`, {
                cache: "no-store"
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            applyBridgeEnvelope(data);
        }

        function connectViaHttpBridge() {
            window.clearInterval(bridgePollTimer);
            window.clearTimeout(bridgeReconnectTimer);

            bridgePost("/api/register", { token: sessionToken })
                .then((data) => {
                    applyBridgeEnvelope(data);
                    bridgePollTimer = window.setInterval(() => {
                        pollBridgeEvents().catch(() => {
                            window.clearInterval(bridgePollTimer);
                            bridgePollTimer = null;
                            desktopReady = false;
                            updateDesktopState();
                            updateConnectionBadge("waiting");
                            bridgeReconnectTimer = window.setTimeout(connect, 3000);
                        });
                    }, 1200);
                })
                .catch(() => {
                    desktopReady = false;
                    updateDesktopState();
                    updateConnectionBadge("waiting");
                    bridgeReconnectTimer = window.setTimeout(connect, 3000);
                });
        }

        function connect() {
            if (shouldUseHttpBridge()) {
                connectViaHttpBridge();
                return;
            }

            const wsUrl = resolveWsUrl();
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: "register", role: "mobile", token: sessionToken }));
            };

            ws.onclose = () => {
                desktopReady = false;
                updateDesktopState();
                updateConnectionBadge("waiting");
                window.setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                updateConnectionBadge("waiting");
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === "auth") {
                        if (data.ok) {
                            updateConnectionBadge("connected");
                        } else {
                            updateConnectionBadge("waiting");
                            loadRuntimeConfig();
                            showSyncStatus("这个手机地址已经失效，请重新扫码。", "error", 2400);
                        }
                        return;
                    }

                    if (data.type === "presence") {
                        updatePresence(data.connected || {});
                        return;
                    }

                    if (data.type === "ack") {
                        handleAck(data);
                    }
                } catch (error) {
                    console.error("状态消息解析失败:", error);
                }
            };
        }

        function syncRealtimeInput(currentText) {
            const change = analyzeTailChange(lastAppliedText, currentText);
            if (change.type === "noop") {
                return;
            }

            if (change.type === "append") {
                if (!change.text) {
                    return;
                }
                sendPayload("text", change.text, { optimisticText: currentText });
                markPending();
                return;
            }

            if (change.type === "delete") {
                if (change.count <= 0) {
                    return;
                }

                if (currentText.length === 0) {
                    sendPayload("clear", String(lastAppliedText.length), { optimisticText: "" });
                    markSynced();
                    return;
                }

                if (change.count <= 6) {
                    for (let index = 0; index < change.count; index += 1) {
                        sendPayload("backspace", "");
                    }
                    lastAppliedText = currentText;
                    markPending();
                    return;
                }

                sendPayload("replace_all", currentText, { optimisticText: currentText });
                markPending("正在整段对齐电脑内容");
                return;
            }

            setMode("manual");
            markDesynced("检测到输入法改写，改用整段同步更稳");
            showSyncStatus("检测到中间改写，请点“整段同步到电脑”对齐内容。", "error", 2600);
        }

        function handleTextareaInput() {
            updateStats();
            if (syncMode !== "live" || composing) {
                markDesynced(syncMode === "live" ? "输入法处理中，稍后自动同步" : "当前是整段同步模式");
                return;
            }
            syncRealtimeInput(textInput.value);
        }

        function insertTextAtEnd(value) {
            textInput.value += value;
            textInput.dispatchEvent(new Event("input", { bubbles: true }));
        }

        function syncEntireDraft() {
            sendPayload("replace_all", textInput.value, { optimisticText: textInput.value, manualSync: true });
            markPending("正在整段同步到电脑");
        }

        function clearDraftOnly() {
            textInput.value = "";
            updateStats();
            if (syncMode === "live") {
                markDesynced("本地草稿已清空，电脑内容未变");
                showSyncStatus("本地草稿已清空，电脑内容没有一起清空。", "pending");
            } else {
                markDesynced("草稿已清空，电脑内容不受影响");
                showSyncStatus("草稿已清空。", "pending");
            }
        }

        function clearComputerInput() {
            textInput.value = "";
            updateStats();
            sendPayload("replace_all", "", { optimisticText: "", manualSync: true });
            markPending("正在清空电脑当前输入");
        }

        liveModeButton.addEventListener("click", () => setMode("live"));
        manualModeButton.addEventListener("click", () => setMode("manual"));
        syncButton.addEventListener("click", syncEntireDraft);
        clearButton.addEventListener("click", clearDraftOnly);
        newlineButton.addEventListener("click", () => insertTextAtEnd("\n"));
        clearComputerButton.addEventListener("click", clearComputerInput);

        textInput.addEventListener("input", handleTextareaInput);
        textInput.addEventListener("compositionstart", () => {
            composing = true;
            if (syncMode === "live") {
                markDesynced("输入法处理中，结束后再同步");
            }
        });
        textInput.addEventListener("compositionend", () => {
            composing = false;
            handleTextareaInput();
        });

        window.addEventListener("load", async () => {
            updateStats();
            updateDesktopState();
            updateModeUi();
            updateConnectionBadge("waiting");
            await loadRuntimeConfig();
            if (!sessionToken && runtimeConfig.sessionToken) {
                sessionToken = runtimeConfig.sessionToken;
            }
            if (!sessionToken) {
                updateConnectionBadge("error");
                showSyncStatus("这个手机地址没有会话令牌，请重新扫码。", "error", 2600);
                return;
            }
            connect();
        });
    </script>
</body>
</html>
