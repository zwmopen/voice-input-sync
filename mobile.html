<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3f86ff">
    <title>语音输入同步</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/voice-sync-icon.svg">
    <link rel="manifest" href="/site.webmanifest">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #e0e5ec;
            min-height: 100vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .neu-card {
            background: #e0e5ec;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 8px 8px 16px #b8bec7, -8px -8px 16px #ffffff;
            margin-bottom: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            color: #5a6170;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            line-height: 1.6;
            color: #7a8194;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #5a6170;
        }

        .status-badge.disconnected {
            background: #e0e5ec;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
        }

        .status-badge.connected {
            background: linear-gradient(145deg, #a8e6cf, #88d4ab);
            color: #fff;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff6b6b;
        }

        .status-badge.connected .status-dot {
            background: #fff;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            padding: 10px;
            background: #e0e5ec;
            border-radius: 10px;
            box-shadow: inset 2px 2px 4px #b8bec7, inset -2px -2px 4px #ffffff;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #7a8194;
            margin-top: 2px;
        }

        .guide-card {
            padding: 18px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 700;
            color: #495161;
            margin-bottom: 8px;
        }

        .guide-text {
            font-size: 14px;
            color: #778092;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .guide-steps {
            display: grid;
            gap: 8px;
        }

        .guide-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #e0e5ec;
            box-shadow: inset 2px 2px 5px #b8bec7, inset -2px -2px 5px #ffffff;
            color: #5a6170;
            font-size: 13px;
            line-height: 1.5;
        }

        .step-badge {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            flex: 0 0 auto;
        }

        .input-section {
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            border: none;
            background: #e0e5ec;
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            outline: none;
            box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
            font-family: inherit;
            color: #5a6170;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #a0a7b8;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #7a8194;
            margin-top: 8px;
            font-weight: 500;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .neu-button {
            padding: 12px 8px;
            border: none;
            border-radius: 12px;
            background: #e0e5ec;
            box-shadow: 4px 4px 8px #b8bec7, -4px -4px 8px #ffffff;
            font-size: 13px;
            font-weight: 600;
            color: #5a6170;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .neu-button:active {
            box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
        }

        .neu-button .icon {
            font-size: 18px;
        }

        .neu-button.primary {
            background: linear-gradient(145deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 4px 4px 12px rgba(102, 126, 234, 0.4), -4px -4px 12px rgba(255, 255, 255, 0.8);
        }

        .neu-button.primary:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
        }

        .neu-button.danger {
            background: linear-gradient(145deg, #ff6b6b, #ee5a6f);
            color: #fff;
            box-shadow: 4px 4px 12px rgba(255, 107, 107, 0.4), -4px -4px 12px rgba(255, 255, 255, 0.8);
        }

        .neu-button.danger:active {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.2), inset -4px -4px 8px rgba(255, 255, 255, 0.2);
        }

        .sync-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #e0e5ec;
            padding: 12px 25px;
            border-radius: 25px;
            box-shadow: 4px 4px 12px #b8bec7, -4px -4px 12px #ffffff;
            font-size: 14px;
            font-weight: 600;
            color: #5a6170;
            display: none;
            z-index: 1000;
        }

        .sync-status.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate(-50%, 20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎤 语音输入同步</h1>
            <div class="subtitle">手机说话，电脑同步打字。先在电脑上点好光标，再开始输入。</div>
            <div class="status-badge disconnected" id="statusBadge">
                <span class="status-dot"></span>
                <span id="statusText">未连接</span>
            </div>
        </div>

        <div class="neu-card guide-card">
            <div class="guide-title">第一次用，先看这三步</div>
            <div class="guide-text">这个页面只负责把你的输入同步到电脑当前光标位置，不会替你决定输入到哪里。</div>
            <div class="guide-steps">
                <div class="guide-step"><span class="step-badge">1</span><span>先去电脑上，把光标点到你要输入的位置。</span></div>
                <div class="guide-step"><span class="step-badge">2</span><span>保持这个手机页面开着，直接语音输入或手动输入。</span></div>
                <div class="guide-step"><span class="step-badge">3</span><span>如果手机已连接但电脑不打字，请回电脑使用管理员启动。</span></div>
            </div>
        </div>

        <div class="neu-card">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalChars">0</div>
                    <div class="stat-label">总字数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sessionChars">0</div>
                    <div class="stat-label">本次字数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="deleteTime">0s</div>
                    <div class="stat-label">清空时长</div>
                </div>
            </div>
        </div>

        <div class="neu-card">
            <div class="input-section">
                <textarea id="textInput" placeholder="点击此输入框，使用手机语音输入法开始语音输入...

支持：豆包输入法、搜狗、讯飞等"></textarea>
                <div class="char-count" id="charCount">0 字</div>
            </div>

            <div class="control-buttons">
                <button class="neu-button danger" onclick="clearAll()">
                    <span class="icon">🗑️</span>
                    <span>清空</span>
                </button>
                <button class="neu-button" onclick="sendEnter()">
                    <span class="icon">↵</span>
                    <span>换行</span>
                </button>
                <button class="neu-button primary" onclick="sendAll()">
                    <span class="icon">📤</span>
                    <span>发送全部</span>
                </button>
                <button class="neu-button" onclick="sendBackspace()">
                    <span class="icon">⌫</span>
                    <span>删除</span>
                </button>
                <button class="neu-button" onclick="sendSpace()">
                    <span class="icon">␣</span>
                    <span>空格</span>
                </button>
                <button class="neu-button" onclick="sendTab()">
                    <span class="icon">⇥</span>
                    <span>Tab</span>
                </button>
            </div>
        </div>
    </div>

    <div class="sync-status" id="syncStatus">✓ 已发送到电脑</div>

    <script>
        let ws = null;
        let lastText = '';
        let typingTimeout = null;
        let sessionCharCount = 0;
        let desktopReady = false;
        const DELETE_SPEED = 0.012;

        function connect() {
            const wsUrl = `ws://${window.location.hostname}:8765`;
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('已连接到服务器');
                updateStatus(true);
                ws.send(JSON.stringify({ type: 'register', role: 'mobile' }));
            };

            ws.onclose = () => {
                console.log('连接断开，3秒后重连');
                updateStatus(false);
                desktopReady = false;
                setTimeout(connect, 3000);
            };

            ws.onerror = (error) => {
                console.error('连接错误:', error);
                updateStatus(false);
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'presence') {
                        const connected = data.connected || {};
                        desktopReady = !!connected.desktop;
                    }
                } catch (error) {
                    console.error('状态消息解析失败:', error);
                }
            };
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');

            if (connected) {
                badge.className = 'status-badge connected';
                text.textContent = '已连接';
            } else {
                badge.className = 'status-badge disconnected';
                text.textContent = '未连接';
            }
        }

        function sendData(type, content) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const data = {
                    type: type,
                    content: content,
                    timestamp: Date.now()
                };
                ws.send(JSON.stringify(data));
                showSyncStatus();
            }
        }

        function showSyncStatus() {
            const status = document.getElementById('syncStatus');
            if (!desktopReady) {
                status.textContent = '电脑输入端未就绪，请回电脑使用管理员启动';
            } else {
                status.textContent = '✓ 已发送到电脑';
            }
            status.classList.add('show');
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                status.classList.remove('show');
            }, 1500);
        }

        function updateStats() {
            const text = document.getElementById('textInput').value;
            const totalChars = text.length;

            document.getElementById('totalChars').textContent = totalChars;
            document.getElementById('sessionChars').textContent = sessionCharCount;

            const deleteTime = Math.ceil(totalChars * DELETE_SPEED * 1.2);
            document.getElementById('deleteTime').textContent = deleteTime + 's';
        }

        function sendBackspace() {
            sendData('backspace', '');
        }

        function sendEnter() {
            sendData('enter', '');
            document.getElementById('textInput').value += '\n';
            sessionCharCount += 1;
            updateStats();
        }

        function sendSpace() {
            sendData('text', ' ');
            document.getElementById('textInput').value += ' ';
            sessionCharCount += 1;
            updateStats();
        }

        function sendTab() {
            sendData('tab', '');
            document.getElementById('textInput').value += '    ';
            sessionCharCount += 4;
            updateStats();
        }

        function clearAll() {
            const text = document.getElementById('textInput').value;
            const length = text.length;

            if (length === 0) return;

            document.getElementById('textInput').value = '';
            lastText = '';
            sessionCharCount = 0;
            document.getElementById('charCount').textContent = '0 字';

            updateStats();
            sendData('clear', length.toString());
            showSyncStatus();
        }

        function sendAll() {
            const text = document.getElementById('textInput').value;
            if (text) {
                sendData('text', text);
            }
        }

        // 监听输入变化
        document.getElementById('textInput').addEventListener('input', function(e) {
            const text = e.target.value;
            const newContent = text.substring(lastText.length);

            document.getElementById('charCount').textContent = `${text.length} 字`;

            if (newContent) {
                sendData('text', newContent);
                lastText = text;
                sessionCharCount += newContent.length;
                updateStats();
            }
        });

        // 监听手机键盘的删除键和回车键
        document.getElementById('textInput').addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                // 检测到删除键
                const text = e.target.value;
                if (text.length > 0) {
                    sendData('backspace', '');
                    lastText = text.substring(0, text.length - 1);
                    sessionCharCount = Math.max(0, sessionCharCount - 1);
                    updateStats();
                }
            } else if (e.key === 'Enter') {
                // 检测到回车键
                e.preventDefault();
                sendData('enter', '');
                e.target.value += '\n';
                lastText = e.target.value;
                sessionCharCount += 1;
                updateStats();
            }
        });

        // 页面加载后连接
        window.addEventListener('load', () => {
            connect();
            updateStats();
        });
    </script>
</body>
</html>
